# =========================
# Log4j2 Global Settings
# =========================
status = info
name = properties_configuration

# Base path for log files
property.basePath = ./logs/

# =========================
# Custom Log Levels
# =========================
customLevels.type = CustomLevels

customLevels.ACTIVITY.type = CustomLevel
customLevels.ACTIVITY.name = ACTIVITY
customLevels.ACTIVITY.intLevel = 50

# =========================
# Console Appender
# =========================
appender.console.type = Console
appender.console.name = consoleLogger
appender.console.target = SYSTEM_OUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS z} [%t] [%-5p] %c %M{1}: line %L - %m%n

# =========================
# Rolling File Appender
# =========================
appender.rolling.type = RollingFile
appender.rolling.name = fileLogger
appender.rolling.fileName = ${basePath}App.log
appender.rolling.filePattern = ${basePath}app_%d{yyyyMMdd}.log.gz
appender.rolling.layout.type = PatternLayout
appender.rolling.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS z} [%t] %-5p %c %M{1}: line %L - %m%n

# Rolling policies (daily, delete after 30 days)
appender.rolling.policies.type = Policies
appender.rolling.policies.time.type = TimeBasedTriggeringPolicy
appender.rolling.policies.time.interval = 1
appender.rolling.policies.time.modulate = true

appender.rolling.strategy.type = DefaultRolloverStrategy
appender.rolling.strategy.delete.type = Delete
appender.rolling.strategy.delete.basePath = ${basePath}
appender.rolling.strategy.delete.maxDepth = 1
appender.rolling.strategy.delete.ifLastModified.type = IfLastModified
appender.rolling.strategy.delete.ifLastModified.age = 30d

# =========================
# Root Logger
# =========================
rootLogger.level = debug
rootLogger.additivity = false
rootLogger.appenderRef.console.ref = consoleLogger
rootLogger.appenderRef.rolling.ref = fileLogger

# =========================
# Jetty Logger (reduce verbosity)
# =========================
logger.jetty.name = org.eclipse.jetty
logger.jetty.level = info
logger.jetty.additivity = false
logger.jetty.appenderRef.console.ref = consoleLogger
logger.jetty.appenderRef.rolling.ref = fileLogger

# =========================
# Hibernate Logger
# =========================
logger.hibernate.name = org.hibernate
logger.hibernate.level = error
logger.hibernate.additivity = false
logger.hibernate.appenderRef.console.ref = consoleLogger
logger.hibernate.appenderRef.rolling.ref = fileLogger